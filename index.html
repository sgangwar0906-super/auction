<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPL Auction Arena</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Live multiplayer auction</p>
          <h1>IPL Auction Arena</h1>
        </div>
        <div class="room-pill" id="roomPill">No room</div>
      </section>

      <section id="setup" class="grid two">
        <form class="panel" id="hostForm">
          <h2>Host Auction</h2>
          <label>Budget per team
            <input name="budget" type="text" value="100 cr">
          </label>
          <label>Bid step
            <input name="bidStep" type="text" value="10 lakh">
          </label>
          <button type="submit">Create Host Room</button>
        </form>

        <form class="panel" id="joinForm">
          <h2>Join Auction</h2>
          <label>Room code
            <input name="code" maxlength="6" placeholder="ABC123" required>
          </label>
          <label>Team name
            <input name="teamName" maxlength="32" placeholder="Mumbai Mavericks" required>
          </label>
          <button type="submit">Join as Team</button>
        </form>
      </section>

      <section id="app" class="hidden">
        <section class="auction-board">
          <div class="player-stage">
            <div class="set-chip" id="activeSet">Waiting</div>
            <h2 id="activeName">Upload players to begin</h2>
            <div class="meta-row">
              <span id="activeRole">Role</span>
              <span id="activeBase">Base price</span>
            </div>
            <div class="bid-strip">
              <div>
                <span>Current bid</span>
                <strong id="currentBid">0</strong>
              </div>
              <div>
                <span>Current bidder</span>
                <strong id="highestBidder">None</strong>
              </div>
              <div class="timer">
                <span>Timer</span>
                <strong id="timer">--</strong>
              </div>
            </div>
            <div class="actions">
              <button id="bidBtn">Bid</button>
              <button id="skipBtn" class="ghost hidden">Skip Player</button>
              <button id="pauseBtn" class="ghost hidden">Pause Auction</button>
              <button id="startBtn" class="ghost hidden">Start Auction</button>
              <button id="playersBtn" class="ghost" type="button">Players List</button>
            </div>
            <p id="message" class="message"></p>
          </div>

          <aside class="panel host-panel hidden" id="hostPanel">
            <h2>Host Controls</h2>
            <form id="hostTeamForm" class="mini-form">
              <label>Host team name
                <input name="teamName" maxlength="32" placeholder="Host Super Kings">
              </label>
              <button type="submit">Join as Host Team</button>
            </form>
            <label>Upload Excel or CSV
              <input id="fileInput" type="file" accept=".xlsx,.csv">
            </label>
            <p class="hint">Columns: player/name, base price, set, role, points.</p>
            <div class="copy-row">
              <input id="shareLink" readonly>
              <button id="copyLink" type="button">Copy Link</button>
            </div>
          </aside>
        </section>

        <section class="grid two lower">
          <div class="panel teams-panel">
            <h2 id="leaderboardTitle">Teams</h2>
            <div id="leaderboard" class="leaderboard"></div>
          </div>
        </section>
      </section>
    </main>

    <aside id="playersPanel" class="players-drawer hidden">
      <div class="drawer-head">
        <div>
          <p class="eyebrow">Auction pool</p>
          <h2>Players List</h2>
        </div>
        <button id="closePlayers" class="ghost" type="button">Close</button>
      </div>
      <div id="playersList" class="queue"></div>
    </aside>

    <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="set-chip" id="resultType">Sold</div>
        <h2 id="resultTitle">Player sold</h2>
        <p id="resultBody"></p>
        <button id="closeResult" type="button">Close</button>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
